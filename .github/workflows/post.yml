name: K5Bearing signals

# Single trigger source on purpose. cron-job.org pings this dispatch every
# 30 min; runs finish in ~2 min, so two runs can never overlap. Using BOTH a
# GitHub schedule and cron-job.org previously let two runs fire seconds apart,
# and the second read state.json before the first committed -> duplicate post.
# (Manual runs from the Actions tab still work via this same dispatch.)
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without posting"
        type: boolean
        default: false

# Belt-and-suspenders: even if two dispatches ever land close together,
# serialize them so they can't race on state.json.
concurrency:
  group: k5bearing-post
  cancel-in-progress: false

permissions:
  contents: write           # needed to commit state.json back

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 8        # safety net: never let a slow run hang and block the queue
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      # Pull the freshest state.json right before posting. If a prior run
      # committed a post seconds ago (or runs briefly overlap), this picks it
      # up so we never re-post off stale state.
      - name: Refresh posting state
        run: |
          git config user.name "k5bearing-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true

      - name: Post signals
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python -m src.main

      - name: Persist posting state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet state.json 2>/dev/null; then
            echo "state.json unchanged"
            exit 0
          fi
          git config user.name "k5bearing-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git commit -m "chore: update posting state [skip ci]"
          # Retry against a moving remote: if the push is rejected because the
          # branch advanced, rebase our state commit on top and try again. A
          # silently-lost state commit is the #1 cause of duplicate posts, so we
          # must never let the push fail quietly.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "state pushed (attempt $attempt)"
              exit 0
            fi
            echo "push rejected, rebasing and retrying (attempt $attempt)"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          done
          echo "ERROR: could not persist state.json after 5 attempts" >&2
          exit 1
