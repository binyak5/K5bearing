    <polygon points="300,300 300,65 329.7,270.3"/>
    <polygon points="300,300 535,300 329.7,329.7"/>
    <polygon points="300,300 300,535 270.3,329.7"/>
    <polygon points="300,300 65,300 270.3,270.3"/>
  </g>
