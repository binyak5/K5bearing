  <rect x="0" y="0" width="600" height="600" fill="#000000"/>
  <g fill="#202225">
    <polygon points="300,300 409.6,190.4 332,300"/>
    <polygon points="300,300 409.6,409.6 300,332"/>
    <polygon points="300,300 190.4,409.6 268,300"/>
