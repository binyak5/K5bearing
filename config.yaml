# K5Bearing signal configuration
# Tune what gets posted and how often. All times UTC.

account:
  name: K5Bearing
  org: Kastle Five Systems
  hashtags_default: ["#K5Bearing", "#SpaceWeather"]

# Cost control. Pay-per-use is ~$0.015/post (X's current rate). The monthly cap
# is a hard ceiling. NOTE: this must stay <= your X billing spend cap, or X will
# reject posts once that cap is hit. Current: 20/day, 640/month ~= $9.60/month,
# sitting just under the $10 X billing spend cap.
limits:
  max_posts_per_run: 1   # one post per run; most severe candidate goes first
  max_posts_per_day: 20
  max_posts_per_month: 640  # hard cost cap (~$9.60/month at $0.015/post, under the $10 cap)
  # Minimum minutes between posts. Set cron-job.org to fire every 30 min (a clean
  # */30 since 30 divides 60); this 25-min gap sits just under that so every run
  # posts once -> an even 30 minutes apart, with margin for cron jitter. It also
  # acts as a backstop: if two runs ever land close together, the second is held,
  # so we never double-post. The Rotterdam update is exempt.
  min_minutes_between_posts: 25
  # Per-area cooldown: after posting a warning for a state/country, hold further
  # posts for that same area this many hours, so one severe-weather outbreak
  # (e.g. an Illinois tornado + flash-flood pile-up) can't dominate the feed. A
  # strictly more severe warning for the area still breaks through. Keyed on the
  # geo tag ("USA, Illinois" / "EU, France" / "GCC, ..."); coordinate-less
  # signals (space weather, marine, quakes) carry no area and are unaffected.
  area_cooldown_hours: 2
  # Per-category daily caps so no single source dominates the feed. The account
  # is now Rotterdam-only plus global space weather, so only those categories are
  # listed; caps for the muted sources (US/Gulf/marine/maritime/etc.) were
  # dropped and can be restored from git when those regions come back. Caps sum
  # above max_posts_per_day so the feed never goes fully silent on a quiet day.
  # Categories not listed are uncapped.
  category_daily_caps:
    cityweather: 2    # the scheduled Rotterdam update (morning + evening); exempt from budget
    weather_eu: 6     # Netherlands MeteoAlarm severe-weather warnings
    outdoor: 3        # Rotterdam UV / dust / lightning
    geomagnetic: 2
    solar: 2
    solarwind: 2      # high-speed solar wind streams
    flare: 2
    radiation: 1
    blackout: 1

# Don't repost the same signal within this many hours (dedup TTL). Long enough
# that multi-day warnings don't repeat in the feed.
dedup_ttl_hours: 48

# Regional scope. Only post events within these regions. Currently Rotterdam-only,
# so Europe alone; the US and Gulf location sources are disabled below. Space
# weather is global and unaffected by this filter.
regions: ["europe"]

# Media cards: attach a generated black/Eurostile card image (with the dotted
# region map + orange location dot) to posts. Which event types get a card is
# chosen per-event in the sources (only those set `card` data); this flag is the
# master on/off switch. Off by default — flip to true to go live.
# Card-enabled events: all Gulf hazards; marine high-seas / storm- & hurricane-
# force wind / swell / fog; outdoor lightning; earthquakes; GDACS volcano &
# wildfire; red tide; NGA launch & gunfire.
media:
  enabled: false

# Geomagnetic / compass thresholds (planetary K-index, 0-9).
geomagnetic:
  enabled: true
  # Post an alert when Kp meets or exceeds this. 5 = G1 storm.
  kp_alert_threshold: 5

# Aurora-visibility watch, derived from the Kp index (global viewline).
aurora:
  enabled: false
  # Kp at/above which aurora may be visible at populated latitudes.
  kp_threshold: 5

# Solar storm alerts pulled from SWPC alerts.json.
# Match on product_id prefixes. See README for the code list.
solar:
  enabled: true
  # Radio blackouts (R), Solar radiation storms (S), strong flares.
  watch_prefixes: ["WARK", "ALTK", "WATA", "ALTS", "SUM", "WARN"]

# Solar flares from the GOES X-ray sensor (live).
solar_flares:
  enabled: true
  # Minimum flare class to post: C | M | X. M+ is the usual "notable" bar.
  min_class: "M"
  max_age_hours: 6

# High-speed solar wind stream (NOAA SWPC real-time plasma, DSCOVR/ACE).
# A fast stream stirs the magnetic field — on brand for the compass angle.
solar_wind:
  enabled: true
  speed_threshold_kms: 600   # km/s; 600+ = a fast stream that disturbs the field

# Solar radiation storms (NOAA S-scale, 1-5).
radiation:
  enabled: true
  min_scale: 1     # S1 (minor) and up

# HF radio blackouts from solar flares (NOAA R-scale, 1-5).
radio_blackout:
  enabled: true
  min_scale: 1     # R1 (minor) and up

# Significant earthquakes (USGS), filtered to USA / Europe / Gulf.
# Muted: Rotterdam-only scope. Re-enable to restore terrestrial quake coverage.
earthquakes:
  enabled: false
  min_magnitude: 5.0     # lower bar since we're region-limited (Europe/Gulf quakes are smaller)
  max_age_hours: 6       # ignore quakes older than this on startup

# Gulf-state weather alerts the official feeds miss (NWS is US-only, MeteoAlarm
# is Europe-only): extreme heat, shamal winds, dense fog, thunderstorms, heavy
# rain / flash flooding, and dust storms, from Open-Meteo (keyless).
# Fires once per city per day per hazard. Temps in °C, winds in km/h.
# Muted: Rotterdam-only scope. Wordings and the city list are kept for re-enable.
gulf_weather:
  enabled: false
  heat_feels_c: 47       # feels-like (apparent) temperature at/above this = dangerous heat
  wind_gust_kmh: 55      # wind gusts at/above this = shamal / high-wind alert
  fog_visibility_m: 1000 # dense fog when visibility drops below this (metres)
  rain_mm: 7             # heavy rain / flash-flood risk at/above this (mm in the hour)
  dust_threshold: 500    # airborne dust µg/m³; 500+ = a dust storm (air-quality feed)
  cold_c: 2              # forecast overnight low at/below this (°C) = freeze/frost (US Freeze Warning tier)
  locations:
    # UAE
    - {name: "Dubai",          lat: 25.20, lon: 55.27, tz: "Asia/Dubai"}
    - {name: "Abu Dhabi",      lat: 24.45, lon: 54.38, tz: "Asia/Dubai"}
    - {name: "Sharjah",        lat: 25.35, lon: 55.39, tz: "Asia/Dubai"}
    - {name: "Al Ain",         lat: 24.21, lon: 55.74, tz: "Asia/Dubai"}
    - {name: "Ras Al Khaimah", lat: 25.79, lon: 55.94, tz: "Asia/Dubai"}
    - {name: "Fujairah",       lat: 25.13, lon: 56.33, tz: "Asia/Dubai"}
    # Saudi Arabia
    - {name: "Riyadh",         lat: 24.71, lon: 46.68, tz: "Asia/Riyadh"}
    - {name: "Jeddah",         lat: 21.49, lon: 39.19, tz: "Asia/Riyadh"}
    - {name: "Dammam",         lat: 26.43, lon: 50.10, tz: "Asia/Riyadh"}
    - {name: "Mecca",          lat: 21.39, lon: 39.86, tz: "Asia/Riyadh"}
    - {name: "Medina",         lat: 24.52, lon: 39.57, tz: "Asia/Riyadh"}
    - {name: "Tabuk",          lat: 28.38, lon: 36.57, tz: "Asia/Riyadh"}
    # Qatar / Bahrain / Kuwait
    - {name: "Doha",           lat: 25.29, lon: 51.53, tz: "Asia/Qatar"}
    - {name: "Manama",         lat: 26.23, lon: 50.59, tz: "Asia/Bahrain"}
    - {name: "Kuwait City",    lat: 29.38, lon: 47.99, tz: "Asia/Kuwait"}
    # Oman
    - {name: "Muscat",         lat: 23.59, lon: 58.41, tz: "Asia/Muscat"}
    - {name: "Salalah",        lat: 17.02, lon: 54.09, tz: "Asia/Muscat"}
    - {name: "Sohar",          lat: 24.34, lon: 56.71, tz: "Asia/Muscat"}
    - {name: "Sur",            lat: 22.57, lon: 59.53, tz: "Asia/Muscat"}

# Routine twice-daily city weather update (not an alert), Open-Meteo, in local
# time and degrees Celsius. Fires once in the morning window and once in the
# evening window per city per day.
city_weather:
  enabled: true
  morning_hours: [7, 8]     # local-time window for the morning update [start, end): 07:00-08:00
  evening_hours: [19, 20]   # local-time window for the evening update [start, end): 19:00-20:00
  locations:
    - {name: "Rotterdam", lat: 51.92, lon: 4.48, tz: "Europe/Amsterdam"}

# Outdoor-safety watch (Open-Meteo): extreme UV, dust storms, and violent
# thunderstorms. Only fires when a watched location crosses the threshold.
outdoor:
  enabled: true
  uv_threshold: 11       # 11+ = "extreme" (WHO scale)
  dust_threshold: 500    # airborne dust µg/m³; 500+ = a dust storm
  # Rotterdam-only scope. In practice only the lightning watch fires here (NW
  # Europe rarely reaches extreme UV or dust-storm levels), which is the point.
  # The full US/Europe/Gulf city list is preserved in git for re-enable.
  locations:
    - {name: "Rotterdam", lat: 51.92, lon: 4.48}

# Severe-weather alerts from the US National Weather Service.
# Muted: Rotterdam-only scope. The full event list and wordings are kept intact.
weather:
  enabled: false
  # Only these event types get posted (high-stakes by default).
  events:
    - "Tornado Warning"
    - "Hurricane Warning"
    - "Hurricane Watch"
    - "Tropical Storm Warning"
    - "Blizzard Warning"
    - "Extreme Wind Warning"
    - "Severe Thunderstorm Warning"
    - "Flash Flood Warning"
    - "Flood Warning"
    - "Red Flag Warning"        # fire weather
    - "Fire Warning"
    # Marine / sea / ocean — the focus of this account
    - "Storm Surge Warning"
    - "Storm Surge Watch"
    - "Hurricane Force Wind Warning"
    - "Hurricane Force Wind Watch"
    - "Storm Warning"
    - "Gale Warning"
    - "Gale Watch"
    - "Hazardous Seas Warning"
    - "Special Marine Warning"
    - "Small Craft Advisory"     # kept for the collapsed roundup (never posted individually)
    - "Heavy Freezing Spray Warning"
    - "High Surf Warning"
    - "Rip Current Statement"
    - "Coastal Flood Warning"
    - "Lakeshore Flood Warning"
    # Winter
    - "Winter Storm Warning"
    - "Ice Storm Warning"
    - "Extreme Cold Warning"    # NWS renamed from "Wind Chill Warning" in 2024
    # Heat / wind / other
    - "Extreme Heat Warning"    # NWS renamed from "Excessive Heat Warning" in 2024
    - "High Wind Warning"
    - "Dust Storm Warning"
    - "Avalanche Warning"
    - "Freeze Warning"
    - "Air Quality Alert"
  # Optional: restrict to a US state/area code (e.g. "FL"). Empty = nationwide.
  area: ""
  # US states/territories to drop (NWS area codes). Nationwide minus these.
  exclude_areas:
    - PR   # Puerto Rico
    - VI   # U.S. Virgin Islands
    - GU   # Guam
    - AS   # American Samoa
    - MP   # Northern Mariana Islands

# Severe-weather warnings for Europe via MeteoAlarm (EUMETNET).
weather_eu:
  enabled: true
  # min_severity: Moderate (yellow) | Severe (orange) | Extreme (red).
  # Severe filters out the high-volume yellow warnings; raise to Extreme for
  # red-only.
  min_severity: "Severe"
  # Country feed slugs (feeds.meteoalarm.org legacy-atom names). Rotterdam-only
  # scope, so just the Netherlands feed; the full European list is kept in git.
  countries:
    - netherlands

# Marine sea-state (high-seas) warnings via Open-Meteo, for named sea areas.
# Gives Europe (and global) marine coverage where there's no official feed.
# Muted: Rotterdam-only scope. Sea areas and thresholds kept for re-enable.
marine_seas:
  enabled: false
  wave_height_threshold: 4.0   # metres; 4 m+ = "high seas" (WMO)
  fog_visibility_m: 1000       # dense fog at sea when visibility drops below this
  wind_gale_kt: 34             # gale-force at sea (Beaufort 8); 48 = storm, 64 = hurricane
  swell_period_s: 13           # long-period swell danger when period >= this AND
  swell_height_m: 2.0          # swell height >= this (deceptively dangerous groundswell)
  areas:
    # USA
    - {name: "Gulf of Mexico",       lat: 25.0, lon: -90.0}
    - {name: "US Atlantic seaboard", lat: 36.0, lon: -73.0}
    - {name: "US Pacific seaboard",  lat: 37.0, lon: -123.5}
    - {name: "Gulf of Alaska",       lat: 57.0, lon: -145.0}
    # Europe
    - {name: "North Sea",            lat: 56.0, lon: 3.0}
    - {name: "English Channel",      lat: 50.0, lon: -1.0}
    - {name: "Bay of Biscay",        lat: 45.5, lon: -5.0}
    - {name: "Irish Sea",            lat: 53.5, lon: -5.0}
    - {name: "Norwegian Sea",        lat: 66.0, lon: 2.0}
    - {name: "Baltic Sea",           lat: 57.5, lon: 19.0}
    - {name: "Western Mediterranean", lat: 40.0, lon: 5.0}
    - {name: "Aegean Sea",           lat: 38.0, lon: 25.0}
    - {name: "Adriatic Sea",         lat: 43.0, lon: 15.0}
    # Gulf
    - {name: "Persian Gulf",         lat: 27.0, lon: 51.0}
    - {name: "Gulf of Oman",         lat: 24.5, lon: 58.5}
    - {name: "Arabian Sea",          lat: 20.0, lon: 60.0}
    - {name: "Red Sea",              lat: 20.0, lon: 38.0}

# Harmful algal bloom / red tide monitoring for the US Pacific coast, from the
# CalHABMAP shore-station network (SCCOOS ERDDAP, keyless). Fires when a station
# reports a Pseudo-nitzschia bloom or a domoic-acid spike.
# Muted: Rotterdam-only scope (US Pacific coast source).
algal_blooms:
  enabled: false
  cell_threshold: 100000   # Pseudo-nitzschia cells/L; 100k+ = a notable bloom
  da_threshold: 1.0        # domoic acid ng/mL; toxin level worth flagging
  lookback_days: 14        # stations sample roughly weekly, so look back a couple weeks

# Global maritime security / military navigation warnings (NGA Maritime Safety
# Information broadcast warnings — worldwide ocean coverage).
# Muted: Rotterdam-only scope. Categories and wordings kept for re-enable.
maritime_security:
  enabled: false
  # Which to post: launch | mine | gunfire | gps | ice | cable | chokepoint
  categories: ["launch", "mine", "gunfire", "gps", "ice", "cable", "chokepoint"]

# GDACS multi-hazard, region-filtered. Limited to volcanoes and wildfires only:
# floods/quakes/cyclones/tsunamis in our regions are already covered by NWS,
# MeteoAlarm, and USGS, so including them here would just duplicate posts.
# Muted: Rotterdam-only scope.
global_hazards:
  enabled: false
  min_alert: "Orange"        # Orange | Red (Green is routine noise)
  event_types: ["VO", "WF"]  # volcanoes + wildfires (unique to GDACS in-region)
