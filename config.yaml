# K5Bearing signal configuration
# Tune what gets posted and how often. All times UTC.

account:
  name: K5Bearing
  org: Kastle Five Systems
  hashtags_default: ["#K5Bearing", "#SpaceWeather"]

# Cap posts per run and per day to stay within X API budget.
# Pay-per-use is ~$0.01/post. 8/day ~= $2.40/month.
limits:
  max_posts_per_run: 2
  max_posts_per_day: 12

# Don't repost the same signal within this many hours (dedup TTL).
dedup_ttl_hours: 12

# Geomagnetic / compass thresholds (planetary K-index, 0-9).
geomagnetic:
  enabled: true
  # Post an alert when Kp meets or exceeds this. 5 = G1 storm.
  kp_alert_threshold: 5

# Aurora-visibility watch, derived from the Kp index (global viewline).
aurora:
  enabled: true
  # Kp at/above which aurora may be visible at populated latitudes.
  kp_threshold: 5

# Solar storm alerts pulled from SWPC alerts.json.
# Match on product_id prefixes. See README for the code list.
solar:
  enabled: true
  # Radio blackouts (R), Solar radiation storms (S), strong flares.
  watch_prefixes: ["WARK", "ALTK", "WATA", "ALTS", "SUM", "WARN"]

# Solar flares from the GOES X-ray sensor (live).
solar_flares:
  enabled: true
  # Minimum flare class to post: C | M | X. M+ is the usual "notable" bar.
  min_class: "M"
  max_age_hours: 6

# Significant earthquakes worldwide (USGS).
earthquakes:
  enabled: true
  min_magnitude: 6.0     # M6.0+ is "strong"; lower to 5.5 for more volume
  max_age_hours: 6       # ignore quakes older than this on startup

# Outdoor-safety watch (Open-Meteo): extreme UV index.
# Only fires when a watched location crosses the threshold.
outdoor:
  enabled: true
  uv_threshold: 11       # 11+ = "extreme" (WHO scale)
  locations:
    - {name: "Phoenix",      lat: 33.45, lon: -112.07}
    - {name: "Los Angeles",  lat: 34.05, lon: -118.24}
    - {name: "Delhi",        lat: 28.61, lon: 77.21}
    - {name: "Bangkok",      lat: 13.76, lon: 100.50}
    - {name: "Sydney",       lat: -33.87, lon: 151.21}
    - {name: "Mexico City",  lat: 19.43, lon: -99.13}
    - {name: "Madrid",       lat: 40.42, lon: -3.70}
    - {name: "Nairobi",      lat: -1.29, lon: 36.82}
    - {name: "Lima",         lat: -12.05, lon: -77.04}
    - {name: "Jakarta",      lat: -6.21, lon: 106.85}

# Severe-weather alerts from the US National Weather Service.
weather:
  enabled: true
  # Only these event types get posted (high-stakes by default).
  events:
    - "Tornado Warning"
    - "Hurricane Warning"
    - "Hurricane Watch"
    - "Tropical Storm Warning"
    - "Tsunami Warning"
    - "Blizzard Warning"
    - "Extreme Wind Warning"
    - "Severe Thunderstorm Warning"
    - "Flash Flood Warning"
    - "Flood Warning"
    - "Red Flag Warning"        # fire weather
    - "Fire Warning"
    # Marine / sea / ocean — the focus of this account
    - "Storm Surge Warning"
    - "Storm Surge Watch"
    - "Hurricane Force Wind Warning"
    - "Hurricane Force Wind Watch"
    - "Storm Warning"
    - "Storm Watch"
    - "Gale Warning"
    - "Gale Watch"
    - "Hazardous Seas Warning"
    - "Special Marine Warning"
    - "Small Craft Advisory"
    - "Heavy Freezing Spray Warning"
    - "Freezing Spray Advisory"
    - "High Surf Warning"
    - "High Surf Advisory"
    - "Rip Current Statement"
    - "Beach Hazards Statement"
    - "Coastal Flood Warning"
    - "Coastal Flood Watch"
    - "Coastal Flood Advisory"
    - "Lakeshore Flood Warning"
    - "Tsunami Advisory"
    - "Tsunami Watch"
    # Winter
    - "Winter Storm Warning"
    - "Ice Storm Warning"
    - "Extreme Cold Warning"    # NWS renamed from "Wind Chill Warning" in 2024
    # Heat / wind / other
    - "Extreme Heat Warning"    # NWS renamed from "Excessive Heat Warning" in 2024
    - "High Wind Warning"
    - "Dust Storm Warning"
    - "Avalanche Warning"
  # Optional: restrict to a US state/area code (e.g. "FL"). Empty = nationwide.
  area: ""

# Severe-weather warnings for Europe via MeteoAlarm (EUMETNET).
weather_eu:
  enabled: true
  # min_severity: Moderate (yellow) | Severe (orange) | Extreme (red).
  # Severe filters out the high-volume yellow warnings; raise to Extreme for
  # red-only.
  min_severity: "Severe"
  # Country feed slugs (feeds.meteoalarm.org legacy-atom names).
  countries:
    - united-kingdom
    - ireland
    - france
    - germany
    - netherlands
    - belgium
    - spain
    - portugal
    - italy
    - switzerland
    - austria
    - poland
    - sweden
    - norway
    - greece

# Global multi-hazard alerts via GDACS (worldwide: tropical cyclones in all
# basins, floods, earthquakes, volcanoes, wildfires). Covers everywhere the
# US/EU feeds don't — Asia, Africa, Latin America, Oceania.
global_hazards:
  enabled: true
  # Alert levels to post: Orange | Red. (Green is routine background noise.)
  min_alert: "Orange"
  event_types: ["TC", "FL", "EQ", "VO", "TS", "WF"]
